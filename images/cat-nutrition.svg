<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF3E0"></stop>
      <stop offset="1" stop-color="#E9FBF8"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"></rect>

  <!-- Bowl shadow -->
  <ellipse cx="600" cy="585" rx="260" ry="60" fill="#000" opacity=".08"></ellipse>

  <!-- Bowl -->
  <path d="M380 520 C420 650 780 650 820 520 Z" fill="#2EC4B6"></path>
  <path d="M420 520 C450 610 750 610 780 520 Z" fill="#23b3a6"></path>

  <!-- Kibble -->
  <circle cx="520" cy="500" r="18" fill="#C68B59"></circle>
  <circle cx="575" cy="470" r="16" fill="#B97C4C"></circle>
  <circle cx="630" cy="490" r="18" fill="#C68B59"></circle>
  <circle cx="680" cy="465" r="16" fill="#B97C4C"></circle>
  <circle cx="615" cy="450" r="14" fill="#C68B59"></circle>
  <circle cx="545" cy="445" r="14" fill="#B97C4C"></circle>

  <!-- Text -->
  <text x="600" y="210" text-anchor="middle" font-family="Inter, Arial" font-size="56" fill="#2F3E46">
    Choosing the Right Food
  </text>
  <text x="600" y="270" text-anchor="middle" font-family="Inter, Arial" font-size="28" fill="#2F3E46" opacity=".75">
    Balanced meals • better energy • longer life
  </text>

  <!-- Tiny paw icon -->
  <circle cx="600" cy="330" r="12" fill="#FF6B6B"></circle>
  <circle cx="570" cy="320" r="10" fill="#FF6B6B"></circle>
  <circle cx="630" cy="320" r="10" fill="#FF6B6B"></circle>
  <circle cx="585" cy="300" r="9" fill="#FF6B6B"></circle>
  <circle cx="615" cy="300" r="9" fill="#FF6B6B"></circle>
</svg>
